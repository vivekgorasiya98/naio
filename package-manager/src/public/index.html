<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registry Admin | NIAO</title>
  <link rel="icon" href="/assets/brand/feather-mark.png" type="image/png" />
  <link rel="stylesheet" href="/assets/css/niao.css" />
</head>
<body class="admin-page">
  <header class="site-header">
    <div class="inner">
      <a class="brand-link" href="/" aria-label="NIAO Registry home">
        <img class="brand-feather-header" src="/assets/brand/feather-mark.png" alt="" aria-hidden="true" />
        <span class="brand-wordmark-text">NIAO</span>
      </a>
      <nav class="site-nav" aria-label="Main">
        <a href="/">Download</a>
        <a href="/#nm">nm</a>
      </nav>
      <a class="header-cta ghost" href="/">← Back to site</a>
    </div>
  </header>

  <div id="loginCard" class="admin-login-wrap">
    <div class="card admin-login-card">
      <div style="text-align:center;margin-bottom:1.25rem;">
        <div class="feather-mark-wrap">
          <img class="feather-mark" src="/assets/brand/feather-mark.png" alt="" aria-hidden="true" style="height:3.5rem;width:auto;" />
        </div>
        <p class="brand-wordmark-text" style="font-size:1.75rem;margin-bottom:0.5rem;">NIAO</p>
        <h1 class="text-display-md" style="margin-bottom:0.35rem;">Registry Admin</h1>
        <p class="text-caption" style="color:var(--slate-600);">Manage packages, versions, and releases</p>
      </div>
      <label class="field-label">Username</label>
      <input id="username" autocomplete="username" />
      <label class="field-label">Password</label>
      <input id="password" type="password" autocomplete="current-password" />
      <button class="btn btn-primary" id="loginBtn" type="button" style="width:100%;margin-top:1rem;">Sign in</button>
      <div id="loginMsg" class="msg hidden"></div>
    </div>
  </div>

  <div id="dash" class="hidden admin-dash">
    <section class="section-light section-pad">
      <div class="container">
        <div class="section-head-row">
          <div class="section-head" style="margin-bottom:0;">
            <p class="eyebrow">Administration</p>
            <h1 class="text-display-md">Registry Admin</h1>
            <p class="admin-status" id="statusLine">Loading…</p>
          </div>
        </div>

        <div class="tabs admin-tabs">
          <button class="tab active" data-panel="packages" type="button">Packages</button>
          <button class="tab" data-panel="releases" type="button">NIAO releases</button>
          <button class="tab" data-panel="publish" type="button">Publish</button>
          <button class="tab logout" id="logoutBtn" type="button">Logout</button>
        </div>

        <div class="panel active" id="panel-packages">
          <div class="card">
            <div class="row">
              <button id="refreshPkgs" class="btn btn-secondary btn-sm" type="button">Refresh</button>
              <button id="rebuildCatalog" class="btn btn-secondary btn-sm" type="button">Rebuild catalog</button>
              <button id="ftpSync" class="btn btn-secondary btn-sm" type="button">Sync FTP</button>
            </div>
            <div class="table-wrap" id="pkgTableWrap"></div>
            <div id="dashMsg" class="msg hidden"></div>
          </div>
        </div>

        <div class="panel" id="panel-releases">
          <div class="card">
            <h3 class="text-heading" style="margin-bottom:0.75rem;">Add / update release</h3>
            <div class="row">
              <div>
                <label class="field-label">Version</label>
                <input id="relVersion" placeholder="0.2.3" />
              </div>
              <div>
                <label class="field-label">Status</label>
                <select id="relStatus">
                  <option value="active">active</option>
                  <option value="discontinued">discontinued</option>
                  <option value="draft">draft</option>
                </select>
              </div>
            </div>
            <label class="field-label" style="display:flex;align-items:center;gap:0.5rem;margin-top:0.75rem;">
              <input type="checkbox" id="relLatest" style="width:auto;" /> Mark as latest
            </label>
            <label class="field-label">Changelog</label>
            <textarea id="relChangelog" rows="3"></textarea>
            <button class="btn btn-primary" id="saveRelease" type="button">Save release</button>
            <div id="relMsg" class="msg hidden"></div>
            <div class="table-wrap" id="relTableWrap"></div>
          </div>
        </div>

        <div class="panel" id="panel-publish">
          <div class="card">
            <h3 class="text-heading" style="margin-bottom:0.75rem;">Publish library version</h3>
            <div class="row">
              <div>
                <label class="field-label">Name</label>
                <input id="pkgName" placeholder="nllm" />
              </div>
              <div>
                <label class="field-label">Version</label>
                <input id="pkgVersion" placeholder="0.2.2" />
              </div>
            </div>
            <label class="field-label">package.json</label>
            <textarea id="pkgJson" rows="8" class="font-mono" style="font-size:0.82rem;"></textarea>
            <button class="btn btn-primary" id="publishBtn" type="button">Publish</button>
            <div id="publishMsg" class="msg hidden"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <footer class="site-footer section-pad admin-footer">
    <div class="container">
      <div class="footer-bottom admin-footer-inner">
        <a class="brand-link" href="/" aria-label="NIAO home">
          <img class="brand-feather-header" src="/assets/brand/feather-mark.png" alt="" aria-hidden="true" />
          <span class="brand-wordmark-text">NIAO</span>
        </a>
        <div class="risu-row">
          <span class="risu-logo-wrap">
            <img src="/assets/brand/risu-mark.svg" alt="Risu Solutions" />
          </span>
          <p class="text-caption risu-meta">Crafted by <strong>Risu Solutions</strong></p>
        </div>
        <p class="text-caption footer-copy">© <span id="year"></span> Risu Solutions</p>
      </div>
    </div>
  </footer>

  <style>
    .panel { display: none; }
    .panel.active { display: block; }
    table.data-table a { color: var(--niao-green-600); }
  </style>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const tokenKey = 'niao_nm_admin_token';
    const api = (path, opts = {}) => fetch(path, {
      ...opts,
      headers: {
        'Content-Type': 'application/json',
        ...(opts.headers || {}),
        ...(localStorage.getItem(tokenKey) ? { Authorization: 'Bearer ' + localStorage.getItem(tokenKey) } : {}),
      },
    });

    function showMsg(el, text, ok) {
      el.textContent = text;
      el.className = 'msg ' + (ok ? 'ok' : 'err');
      el.classList.remove('hidden');
    }

    async function loadStatus() {
      const res = await api('/admin/status');
      const data = await res.json();
      document.getElementById('statusLine').textContent = `MongoDB: ${data.mongo ? 'on' : 'off'} · FTP: ${data.ftp ? 'on' : 'off'} · API: ${data.apiUrl}`;
    }

    function statusPill(s) {
      const cls = s === 'active' ? 'pill-active' : s === 'yanked' || s === 'discontinued' ? 'pill-warn' : 'pill-muted';
      return `<span class="pill ${cls}">${s || 'active'}</span>`;
    }

    async function loadPackages() {
      const res = await api('/admin/packages');
      const data = await res.json();
      const rows = (data.packages || []).flatMap((p) => {
        const details = p.version_details || (p.versions || []).map((v) => ({ version: v, status: 'active' }));
        if (!details.length) return [[p.name, p.version || '-', p.status || 'active', '-', '']];
        return details.map((d) => [p.name, d.version, p.status || 'active', d.status || 'active', p.remote ? 'remote' : 'bundled']);
      });
      document.getElementById('pkgTableWrap').innerHTML = `<table class="data-table">
        <thead><tr><th>Package</th><th>Version</th><th>Pkg status</th><th>Ver status</th><th>Actions</th></tr></thead>
        <tbody>${rows.map(([n,v,ps,vs]) => `<tr>
          <td><strong class="font-mono">${n}</strong></td>
          <td>${v}</td>
          <td>${statusPill(ps)}</td>
          <td>${statusPill(vs)}</td>
          <td class="actions">
            <button class="btn btn-secondary btn-sm" data-act="v-disc" data-n="${n}" data-v="${v}">Discontinue ver</button>
            <button class="btn btn-secondary btn-sm" data-act="v-active" data-n="${n}" data-v="${v}">Activate ver</button>
            <button class="btn btn-danger btn-sm" data-act="v-yank" data-n="${n}" data-v="${v}">Yank</button>
            <button class="btn btn-danger btn-sm" data-act="v-del" data-n="${n}" data-v="${v}">Delete</button>
            <button class="btn btn-warn btn-sm" data-act="p-disc" data-n="${n}">Discontinue pkg</button>
            <button class="btn btn-warn btn-sm" data-act="p-hide" data-n="${n}">Hide pkg</button>
          </td>
        </tr>`).join('')}</tbody></table>`;
    }

    async function loadReleases() {
      const res = await api('/admin/releases');
      const data = await res.json();
      document.getElementById('relTableWrap').innerHTML = `<table class="data-table">
        <thead><tr><th>Version</th><th>Status</th><th>Variants</th><th>Actions</th></tr></thead>
        <tbody>${(data.releases || []).map((r) => `<tr>
          <td>v${r.version} ${r.is_latest ? '<span class="pill pill-active">latest</span>' : ''}</td>
          <td>${statusPill(r.status)}</td>
          <td>${(r.variants || []).map((v) => `${v.label}: ${v.url ? '<a href="'+v.url+'">file</a>' : 'no url'}`).join('<br>')}</td>
          <td class="actions">
            <button class="btn btn-secondary btn-sm" data-act="r-disc" data-v="${r.version}">Discontinue</button>
            <button class="btn btn-secondary btn-sm" data-act="r-act" data-v="${r.version}">Activate</button>
            <button class="btn btn-danger btn-sm" data-act="r-del" data-v="${r.version}">Delete</button>
          </td>
        </tr>`).join('')}</tbody></table>`;
    }

    document.getElementById('loginBtn').onclick = async () => {
      const res = await fetch('/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username.value, password: password.value }),
      });
      const data = await res.json();
      if (!res.ok) return showMsg(loginMsg, data.error || 'login failed', false);
      localStorage.setItem(tokenKey, data.token);
      loginCard.classList.add('hidden');
      dash.classList.remove('hidden');
      await loadStatus();
      await loadPackages();
      await loadReleases();
    };

    document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem(tokenKey); location.reload(); };

    document.querySelectorAll('.tab[data-panel]').forEach((btn) => {
      btn.onclick = () => {
        document.querySelectorAll('.tab[data-panel]').forEach((t) => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach((p) => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
      };
    });

    document.getElementById('refreshPkgs').onclick = loadPackages;
    document.getElementById('rebuildCatalog').onclick = async () => {
      const res = await api('/admin/catalog/rebuild', { method: 'POST' });
      const data = await res.json();
      showMsg(dashMsg, res.ok ? 'Catalog rebuilt' : data.error, res.ok);
      loadPackages();
    };
    document.getElementById('ftpSync').onclick = async () => {
      const res = await api('/admin/sync/ftp', { method: 'POST' });
      const data = await res.json();
      showMsg(dashMsg, res.ok ? `FTP synced (${data.uploaded} files)` : data.error, res.ok);
    };

    document.getElementById('publishBtn').onclick = async () => {
      const name = pkgName.value.trim();
      const version = pkgVersion.value.trim();
      try {
        const res = await api(`/admin/packages/${encodeURIComponent(name)}/${encodeURIComponent(version)}/publish-json`, {
          method: 'POST',
          body: JSON.stringify({ package: JSON.parse(pkgJson.value) }),
        });
        const data = await res.json();
        showMsg(publishMsg, res.ok ? `Published ${name}@${version}` : data.error, res.ok);
        if (res.ok) loadPackages();
      } catch (err) {
        showMsg(publishMsg, err.message || 'Invalid JSON', false);
      }
    };

    document.getElementById('saveRelease').onclick = async () => {
      const body = {
        version: relVersion.value.trim(),
        status: relStatus.value,
        is_latest: relLatest.checked,
        changelog: relChangelog.value,
      };
      const res = await api('/admin/releases', { method: 'POST', body: JSON.stringify(body) });
      const data = await res.json();
      showMsg(relMsg, res.ok ? `Saved release ${body.version}` : data.error, res.ok);
      if (res.ok) loadReleases();
    };

    document.body.addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-act]');
      if (!btn) return;
      const act = btn.dataset.act;
      const n = btn.dataset.n;
      const v = btn.dataset.v;
      let res;
      if (act === 'v-disc') res = await api(`/admin/packages/${n}/${v}/status`, { method: 'PATCH', body: JSON.stringify({ status: 'discontinued' }) });
      if (act === 'v-active') res = await api(`/admin/packages/${n}/${v}/status`, { method: 'PATCH', body: JSON.stringify({ status: 'active' }) });
      if (act === 'v-yank') res = await api(`/admin/packages/${n}/${v}/status`, { method: 'PATCH', body: JSON.stringify({ status: 'yanked' }) });
      if (act === 'v-del') res = await api(`/admin/packages/${n}/${v}?hard=true`, { method: 'DELETE' });
      if (act === 'p-disc') res = await api(`/admin/packages/${n}/status`, { method: 'PATCH', body: JSON.stringify({ status: 'discontinued' }) });
      if (act === 'p-hide') res = await api(`/admin/packages/${n}/status`, { method: 'PATCH', body: JSON.stringify({ status: 'hidden' }) });
      if (act === 'r-disc') res = await api(`/admin/releases/${v}`, { method: 'PATCH', body: JSON.stringify({ status: 'discontinued' }) });
      if (act === 'r-act') res = await api(`/admin/releases/${v}`, { method: 'PATCH', body: JSON.stringify({ status: 'active' }) });
      if (act === 'r-del') res = await api(`/admin/releases/${v}`, { method: 'DELETE' });
      if (res) {
        const data = await res.json();
        showMsg(dashMsg, res.ok ? 'Updated' : data.error, res.ok);
        loadPackages();
        loadReleases();
      }
    });

    if (localStorage.getItem(tokenKey)) {
      loginCard.classList.add('hidden');
      dash.classList.remove('hidden');
      loadStatus();
      loadPackages();
      loadReleases();
    }
  </script>
</body>
</html>
